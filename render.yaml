services:
  - type: web
    name: attendance-tracker-backend
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: gunicorn backend.app:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: attendance-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.10.0

databases:
  - name: attendance-db
    plan: free
