<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AttendX — Scan QR</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='site.css') }}">
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
</head>

<body>
  <div class="scanner-shell">
    <div class="scanner-card">
      <h2 style="margin-bottom:6px">📷 Scan Attendance QR</h2>
      <p class="muted" style="margin-bottom:16px">Point your camera at the QR code shown by your faculty</p>

      <div id="reader" style="width:100%;max-width:360px;margin:0 auto"></div>

      <div id="scanStatus" class="notice" style="margin-top:16px;display:none"></div>

      <div style="margin-top:20px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
        <button class="btn soft" id="stopBtn" onclick="stopScan()" style="display:none">■ Stop Scanner</button>
        <a class="btn soft" href="/student">← Dashboard</a>
      </div>
    </div>
  </div>

  <script>
    let scanner = null;

    function startScan() {
      scanner = new Html5QrcodeScanner('reader', {
        fps: 10,
        qrbox: { width: 260, height: 260 },
        aspectRatio: 1.0,
      });

      scanner.render(onSuccess, onError);
      document.getElementById('stopBtn').style.display = 'inline-flex';
    }

    function onSuccess(decodedText) {
      stopScan();
      const status = document.getElementById('scanStatus');
      status.style.display = 'block';
      status.textContent = '⏳ Submitting attendance…';

      // Extract token from URL or use raw text
      let token = decodedText;
      try {
        const u = new URL(decodedText);
        const parts = u.pathname.split('/');
        token = parts[parts.length - 1];
      } catch (e) { }

      window.location.href = '/scan/' + encodeURIComponent(token);
    }

    function onError(err) {
      // Suppress continuous errors
    }

    function stopScan() {
      if (scanner) {
        scanner.clear().catch(() => { });
        scanner = null;
      }
      document.getElementById('stopBtn').style.display = 'none';
    }

    // Auto-start on load
    window.addEventListener('load', () => startScan());
  </script>
</body>

</html>
