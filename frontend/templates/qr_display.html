<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AttendX — QR Session</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='site.css') }}">
</head>

<body>
  <div class="qr-shell">
    <div class="qr-card">
      <h2 style="margin-bottom:4px">📡 Live QR Session</h2>
      <p class="muted">Share this QR with students in <strong style="color:var(--text)">{{ token.class_name }}</strong>
      </p>

      <div class="qr-info">
        <span class="qr-tag">{{ token.subject }}</span>
        <span class="qr-tag">{{ token.class_name }}</span>
        {% if token.session_label %}<span class="qr-tag">{{ token.session_label }}</span>{% endif %}
      </div>

      <img src="/qr_image/{{ token.token }}" alt="QR Code for attendance">

      <!-- Countdown ring -->
      <div class="countdown-ring" id="countdownRing">
        <svg width="100" height="100" viewBox="0 0 100 100">
          <circle class="cr-track" cx="50" cy="50" r="44" />
          <circle class="cr-fill" id="crFill" cx="50" cy="50" r="44" stroke-dasharray="276.46" stroke-dashoffset="0" />
        </svg>
        <div class="cr-label" id="crLabel">{{ qr_valid }}</div>
      </div>

      <p class="live-count">👥 Students scanned: <span id="scannedCount">—</span></p>

      <p class="muted" style="font-size:.82rem;margin-top:8px">Session closes automatically when timer ends</p>

      <div style="margin-top:20px">
        <a class="btn soft" href="/faculty">← Faculty Dashboard</a>
      </div>
    </div>
  </div>

  <script>
    const TOKEN = {{ token.token | tojson }};
    const VALID_SEC = {{ qr_valid }};
    const CREATED = {{ token.created_at }};
    const EXPIRES = {{ token.expires_at }};
    const CIRC = 2 * Math.PI * 44; // 276.46

    const crFill = document.getElementById('crFill');
    const crLabel = document.getElementById('crLabel');
    const scanned = document.getElementById('scannedCount');
    let closed = false;

    function tick() {
      const now = Date.now() / 1000;
      const left = Math.max(0, EXPIRES - now);
      const mins = String(Math.floor(left / 60)).padStart(2, '0');
      const secs = String(Math.floor(left % 60)).padStart(2, '0');
      crLabel.textContent = left > 0 ? `${mins}:${secs}` : '00:00';

      const pct = left / VALID_SEC;
      crFill.style.strokeDashoffset = CIRC * (1 - pct);
      if (pct < 0.33) crFill.style.stroke = '#ef4444';
      else if (pct < 0.66) crFill.style.stroke = '#f59e0b';
      else crFill.style.stroke = '#7c3aed';

      if (left <= 0 && !closed) {
        closed = true;
        fetch('/faculty/close_session', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token: TOKEN })
        }).then(() => {
          crLabel.textContent = 'Done';
          document.querySelector('.live-count').textContent = 'Session closed. Absent students notified.';
        });
      }
    }

    function pollCount() {
      fetch(`/api/token_status/${TOKEN}`)
        .then(r => r.json())
        .then(d => {
          if (d.marked !== undefined) scanned.textContent = d.marked;
          else scanned.textContent = '—';
        }).catch(() => { });
    }

    tick();
    setInterval(tick, 1000);
    pollCount();
    setInterval(pollCount, 5000);
  </script>
</body>

</html>
