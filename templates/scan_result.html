<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scan Result</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='site.css') }}">
</head>
<body>
  <div class="center-card" style="text-align:center">
    <h2 class="page-title" style="margin-top:0">{{ 'Attendance Marked' if success else 'Attendance Not Marked' }}</h2>
    <p class="page-subtitle">{{ msg }}</p>
    {% if subject %}<p><strong>{{ subject }}</strong>{% if label %} | {{ label }}{% endif %}</p>{% endif %}
    <a class="btn" href="/student">Back to Dashboard</a>
  </div>
</body>
</html>
