<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AttendX Login</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='site.css') }}">
</head>
<body>
  <div class="center-card">
    <h1 class="page-title" style="margin-top:0">AttendX</h1>
    <p class="page-subtitle" style="margin-bottom:16px">Professional attendance platform</p>

    {% if error %}<div class="notice">{{ error }}</div>{% endif %}

    <form method="POST" action="/login" class="stack">
      <div>
        <label class="muted" style="font-size:12px">Username</label>
        <input type="text" name="username" required placeholder="Enter username">
      </div>
      <div>
        <label class="muted" style="font-size:12px">Password</label>
        <input type="password" name="password" required placeholder="Enter password">
      </div>
      <button class="btn" type="submit">Sign In</button>
    </form>

    <div class="panel" style="margin-top:16px">
      <div class="panel-head"><h3>Quick Demo Accounts</h3></div>
      <div class="panel-body stack">
        <button class="btn soft" type="button" onclick="fill('admin','admin123')">Admin</button>
        <button class="btn soft" type="button" onclick="fill('faculty1','faculty123')">Faculty</button>
        <button class="btn soft" type="button" onclick="fill('student1','student123')">Student</button>
      </div>
    </div>
  </div>
<script>
function fill(u,p){document.querySelector('[name=username]').value=u;document.querySelector('[name=password]').value=p;}
</script>
</body>
</html>
