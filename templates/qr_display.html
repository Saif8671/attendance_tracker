<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live QR Session</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='site.css') }}">
</head>
<body>
<main class="main" style="max-width:760px;margin:0 auto;text-align:center">
  <a href="/faculty" class="btn soft" style="margin-bottom:10px">Back to Dashboard</a>
  <div class="panel" style="padding:18px">
    <h2 class="page-title" style="margin-top:0">{{ token.subject }}</h2>
    <p class="page-subtitle">{{ token.class_name }} | {{ token.session_label }}</p>

    <img id="qrImg" src="/qr_image/{{ token.token }}" alt="QR" style="width:260px;height:260px;border:1px solid var(--border);border-radius:12px;margin:12px auto;display:block">

    <div class="progress" style="max-width:320px;margin:0 auto"><span id="bar" style="width:100%"></span></div>
    <p style="margin:8px 0 0 0"><strong id="timerText">--</strong> seconds remaining</p>
    <div id="status" class="notice" style="max-width:420px;margin:12px auto 0 auto">Active session. Waiting for scans.</div>
  </div>
</main>
<script>
const expiresAt={{ token.expires_at }};const total={{ qr_valid }};let closed=false;
function tick(){const rem=Math.max(0,expiresAt-Date.now()/1000);const sec=Math.ceil(rem);document.getElementById('timerText').textContent=sec;document.getElementById('bar').style.width=(rem/total*100)+'%';if(rem<=0){document.getElementById('bar').style.width='0%';document.getElementById('status').textContent='QR expired. Closing session...';if(!closed){closed=true;fetch('/faculty/close_session',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token:'{{ token.token }}'})}).then(r=>r.json()).then(d=>{document.getElementById('status').textContent=d.ok?('Session closed. '+d.absent_notified+' absentees processed.'):'Session closed.'}).catch(()=>{document.getElementById('status').textContent='Session closed.';});}return;}setTimeout(tick,1000);}tick();
</script>
</body>
</html>
